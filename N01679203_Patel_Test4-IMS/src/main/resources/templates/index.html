<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Inventory System</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="container">
    <h1>Product Inventory Management System</h1>

    <div class="header-bar">
        <span>Manage your product inventory</span>
        <a href="/showNewProductForm" class="btn">+ Add New Product</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price ($)</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${productList}">
                <td th:text="${product.id}">1</td>
                <td th:text="${product.name}">Product Name</td>
                <td th:text="${product.description}">Description</td>
                <td class="price" th:text="${product.price}">99.99</td>
                <td th:text="${product.stock}">10</td>
                <td class="action-links">
                    <a th:href="@{/showFormForUpdate/{id}(id=${product.id})}" class="btn btn-update">Update</a>
                    <a th:href="@{/deleteProduct/{id}(id=${product.id})}" 
                       class="btn btn-delete"
                       onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(productList)}">
                <td colspan="6" class="no-data">No products found. Click "Add New Product" to get started.</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
