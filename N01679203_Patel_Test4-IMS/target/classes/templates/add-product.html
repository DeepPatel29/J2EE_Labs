<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="form-container">
    <div class="page-title">
        <h2>Add New Product</h2>
    </div>

    <form th:action="@{/saveProduct}" th:object="${product}" method="post">
        <div class="form-group">
            <label>Product Name:</label>
            <input type="text" th:field="*{name}" placeholder="Enter product name" required>
        </div>

        <div class="form-group">
            <label>Description:</label>
            <input type="text" th:field="*{description}" placeholder="Enter product description">
        </div>

        <div class="form-group">
            <label>Price ($):</label>
            <input type="number" step="0.01" th:field="*{price}" placeholder="0.00" required>
        </div>

        <div class="form-group">
            <label>Stock Quantity:</label>
            <input type="number" th:field="*{stock}" placeholder="0" required>
        </div>

        <div class="form-buttons">
            <button type="submit" class="btn">Save Product</button>
            <a href="/" class="btn btn-delete">Cancel</a>
        </div>
    </form>

    <a href="/" class="back-link">← Back to Product List</a>
</div>

</body>
</html>
