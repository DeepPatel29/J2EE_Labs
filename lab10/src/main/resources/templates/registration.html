<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab 10 - Register</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 30px 0; }
        .register-box { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.15); width: 400px; }
        .register-box h1 { text-align: center; color: #333; margin-bottom: 25px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; font-size: 14px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 9px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input[type="submit"] { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 5px; }
        input[type="submit"]:hover { background-color: #219a52; }
        .login-link { text-align: center; margin-top: 15px; color: #666; }
        .login-link a { color: #3498db; }
        .section-title { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 0; padding-bottom: 4px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>Register</h1>

        <form method="POST" th:action="@{/register}" id="registerForm">
            <div class="section-title">Account Credentials</div>
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" placeholder="Choose a username" required/>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Choose a password" required/>

            <label for="confirm">Confirm Password:</label>
            <input type="password" name="confirm" id="confirm" placeholder="Confirm your password" required/>

            <div class="section-title">Personal Information</div>
            <label for="fullname">Full Name:</label>
            <input type="text" name="fullname" id="fullname" placeholder="Your full name" required/>

            <div class="section-title">Address</div>
            <label for="street">Street:</label>
            <input type="text" name="street" id="street" placeholder="Street address"/>

            <label for="city">City:</label>
            <input type="text" name="city" id="city" placeholder="City"/>

            <label for="state">State:</label>
            <input type="text" name="state" id="state" placeholder="State"/>

            <label for="zip">Zip Code:</label>
            <input type="text" name="zip" id="zip" placeholder="Zip code"/>

            <div class="section-title">Contact</div>
            <label for="phone">Phone Number:</label>
            <input type="text" name="phone" id="phone" placeholder="Phone number"/>

            <input type="submit" value="Register"/>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/login}">Login here</a>
        </div>
    </div>
</body>
</html>
