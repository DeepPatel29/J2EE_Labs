<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab 10 - Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background-color: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.15); width: 350px; }
        .login-box h1 { text-align: center; color: #333; margin-bottom: 25px; }
        .error-msg { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input[type="submit"] { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        input[type="submit"]:hover { background-color: #2980b9; }
        .register-link { text-align: center; margin-top: 15px; color: #666; }
        .register-link a { color: #3498db; }
        .home-link { text-align: center; margin-top: 10px; }
        .home-link a { color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Login</h1>

        <div class="error-msg" th:if="${param.error}">
            Unable to login. Check your username and password.
        </div>

        <p class="register-link">
            New here? <a th:href="@{/register}">Register here</a>
        </p>

        <form method="POST" th:action="@{/login}" id="loginForm">
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" placeholder="Enter username" required/>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Enter password" required/>

            <input type="submit" value="Login"/>
        </form>

        <div class="home-link">
            <a th:href="@{/}">Back to Home</a>
        </div>
    </div>
</body>
</html>
